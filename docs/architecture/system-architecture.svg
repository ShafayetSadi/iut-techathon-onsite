<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1120" viewBox="0 0 1200 1120" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .box   { filter: url(#shadow); }
      .title { font-size: 17px; font-weight: 600; fill: #0f172a; }
      .sub   { font-size: 13px; fill: #475569; }
      .kicker{ font-size: 11px; font-weight: 700; letter-spacing: 1.4px; }
      .edge  { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .lbl   { font-size: 12px; fill: #64748b; font-style: italic; }
    </style>
  </defs>

  <rect width="1200" height="1120" fill="#f8fafc"/>

  <text x="600" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">6-DOF Arm — Control Architecture</text>
  <text x="600" y="72" text-anchor="middle" class="sub">Multi-modal input → normalization → safety → planning → joint state → consumers</text>

  <!-- ============ INPUT SOURCES ============ -->
  <text x="60" y="120" class="kicker" fill="#2563eb">INPUT SOURCES</text>

  <g class="box">
    <rect x="60"  y="136" width="240" height="76" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="180" y="172" text-anchor="middle" class="title">GUI Joystick</text>
    <text x="180" y="193" text-anchor="middle" class="sub">on-screen cartesian jog</text>
  </g>
  <g class="box">
    <rect x="340" y="136" width="240" height="76" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="460" y="172" text-anchor="middle" class="title">Keyboard</text>
    <text x="460" y="193" text-anchor="middle" class="sub">key bindings → axis deltas</text>
  </g>
  <g class="box">
    <rect x="620" y="136" width="240" height="76" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="740" y="172" text-anchor="middle" class="title">Voice Command</text>
    <text x="740" y="193" text-anchor="middle" class="sub">speech → intent + params</text>
  </g>
  <g class="box">
    <rect x="900" y="136" width="240" height="76" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="1020" y="172" text-anchor="middle" class="title">Autonomous PIN</text>
    <text x="1020" y="193" text-anchor="middle" class="sub">scripted waypoint routine</text>
  </g>

  <!-- converge onto a bus -->
  <path class="edge" d="M 180 212 V 248"/>
  <path class="edge" d="M 460 212 V 248"/>
  <path class="edge" d="M 740 212 V 248"/>
  <path class="edge" d="M 1020 212 V 248"/>
  <path class="edge" d="M 180 248 H 1020"/>
  <path class="edge" d="M 600 248 V 292" marker-end="url(#arrow)"/>

  <!-- ============ NORMALIZATION ============ -->
  <g class="box">
    <rect x="400" y="300" width="400" height="86" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
    <text x="600" y="336" text-anchor="middle" class="title">Motion Command Normalization</text>
    <text x="600" y="358" text-anchor="middle" class="sub">one canonical command shape, whatever the source</text>
    <text x="600" y="376" text-anchor="middle" class="sub">frame · units · rate limiting</text>
  </g>

  <path class="edge" d="M 600 386 V 428" marker-end="url(#arrow)"/>

  <!-- ============ SAFETY ============ -->
  <g class="box">
    <rect x="380" y="436" width="440" height="140" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="600" y="470" text-anchor="middle" class="title">Safety Validation</text>
    <line x1="410" y1="484" x2="790" y2="484" stroke="#fecaca" stroke-width="1.5"/>
    <text x="424" y="509" class="sub">• workspace bounds</text>
    <text x="424" y="533" class="sub">• joint limits</text>
    <text x="424" y="557" class="sub">• reachability</text>
    <text x="790" y="509" text-anchor="end" class="lbl">reject → no motion</text>
    <text x="790" y="533" text-anchor="end" class="lbl">clamp → safe motion</text>
  </g>

  <path class="edge" d="M 600 576 V 618" marker-end="url(#arrow)"/>

  <!-- ============ PLANNER ============ -->
  <g class="box">
    <rect x="410" y="626" width="380" height="96" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="600" y="662" text-anchor="middle" class="title">Motion Planner + IK Solver</text>
    <text x="600" y="684" text-anchor="middle" class="sub">target pose → joint angles</text>
    <text x="600" y="704" text-anchor="middle" class="sub">interpolation · singularity handling</text>
  </g>

  <path class="edge" d="M 600 722 V 764" marker-end="url(#arrow)"/>

  <!-- ============ JOINT STATE ============ -->
  <g class="box">
    <rect x="430" y="772" width="340" height="90" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="600" y="806" text-anchor="middle" class="title">Joint State</text>
    <text x="600" y="836" text-anchor="middle" font-size="18" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#15803d">q₁ … q₆</text>
  </g>

  <!-- fan out -->
  <path class="edge" d="M 600 862 V 906"/>
  <path class="edge" d="M 300 906 H 900"/>
  <path class="edge" d="M 300 906 V 950" marker-end="url(#arrow)"/>
  <path class="edge" d="M 900 906 V 950" marker-end="url(#arrow)"/>

  <!-- ============ CONSUMERS ============ -->
  <g class="box">
    <rect x="160" y="958" width="280" height="86" rx="10" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="300" y="994" text-anchor="middle" class="title">Three.js Rendering</text>
    <text x="300" y="1016" text-anchor="middle" class="sub">live 3D arm pose</text>
  </g>
  <g class="box">
    <rect x="760" y="958" width="280" height="86" rx="10" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="900" y="994" text-anchor="middle" class="title">Dashboard Telemetry</text>
    <text x="900" y="1016" text-anchor="middle" class="sub">angles · limits · status</text>
  </g>

  <text x="600" y="1084" text-anchor="middle" class="lbl">Every command path — manual or autonomous — passes through the same safety gate.</text>
</svg>
